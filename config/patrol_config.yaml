patrol:
  # パトロール間隔（時間単位）
  interval_hours: 2

  # 1回のパトロールあたりの最大コスト（USD）
  max_cost_per_run_usd: 0.01

  # 調査対象トピック（Researchエージェントに渡す検索クエリ）
  topics:
    - "最新 AIエージェント AGI ニュース"
    - "軽量LLM 新モデル リリース"
    - "マルチエージェント オーケストレーション 最新動向"
    - "ヒューマノイドロボット 最新ニュース"
    - "AI医療 最新研究"

  # この関連度スコア以上をプッシュ通知対象
  alert_threshold: 0.7

  # アラートログの保存先
  alert_log: "data/patrol_alerts.json"
